<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Vendas - Notas Fiscais</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="estilo.css">
</head>
<body class="fundo-sistema p-6">
    <header class="cabecalho-marca bg-black border-b-4 border-yellow-400 p-4 rounded-t-lg shadow-md flex flex-col sm:flex-row justify-between items-center gap-4">
        <h1 class="text-2xl font-black text-yellow-400 tracking-wider">FDTECH</h1>
        
        <div class="flex items-center space-x-2 bg-zinc-900 p-1.5 rounded border border-zinc-700">
            <label for="seletor-impressao" class="text-xs text-gray-400 font-bold uppercase pl-1">🖨️ Tipo de Impressão:</label>
            <select id="seletor-impressao" onchange="atualizarTipoImpressao()" class="bg-black text-yellow-400 text-xs font-bold p-1 rounded focus:outline-none cursor-pointer">
                <option value="modo-termica" selected>Mini Térmica (80mm)</option>
                <option value="modo-a4">Folha Comum (A4)</option>
            </select>
        </div>
    </header>

    <div class="container-principal max-w-5xl mx-auto nao-imprimir">
        <nav class="menu-abas flex space-x-2 mb-6 bg-white p-2 rounded-lg shadow-sm">
            <button id="botao-aba-clientes" onclick="mudarAba('aba-clientes')" class="aba-botao flex-1 py-2 px-4 rounded font-bold bg-yellow-400 text-black">👥 Clientes</button>
            <button id="botao-aba-produtos" onclick="mudarAba('aba-produtos')" class="aba-botao flex-1 py-2 px-4 rounded font-bold bg-zinc-800 text-gray-300 hover:bg-gray-700">📦 Produtos</button>
            <button id="botao-aba-notas" onclick="mudarAba('aba-notas')" class="aba-botao flex-1 py-2 px-4 rounded font-bold bg-zinc-800 text-gray-300 hover:bg-gray-700">📝 Nova Nota</button>
            <button id="botao-aba-historico" onclick="mudarAba('aba-historico')" class="aba-botao flex-1 py-2 px-4 rounded font-bold bg-zinc-800 text-gray-300 hover:bg-gray-700">📋 Histórico</button>
        </nav>

        <section id="aba-clientes" class="aba-conteudo bg-white p-6 rounded-lg shadow-md border border-gray-200">
            <h2 class="titulo-secao text-xl font-bold mb-4 text-gray-800 border-b pb-2">👥 Cadastrar Novo Cliente</h2>
            <form id="formulario-cliente" class="espacamento-formulario space-y-4 max-w-md">
                <div>
                    <label class="rotulo-campo block text-sm font-semibold text-gray-700 mb-1">Nome Completo do Cliente</label>
                    <input type="text" id="cliente-nome" required class="campo-entrada w-full p-2.5 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-yellow-400">
                </div>
                <div>
                    <label class="rotulo-campo block text-sm font-semibold text-gray-700 mb-1">Cidade</label>
                    <input type="text" id="cliente-cidade" required placeholder="Ex: Machado" class="campo-entrada w-full p-2.5 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-yellow-400">
                </div>
                <div>
                    <label class="rotulo-campo block text-sm font-semibold text-gray-700 mb-1">Telefone (WhatsApp)</label>
                    <input type="text" id="cliente-telefone" placeholder="Ex: 35999998888" class="campo-entrada w-full p-2.5 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-yellow-400">
                </div>
                
                <button type="submit" class="bg-black text-yellow-400 border border-yellow-400 py-2.5 px-6 rounded font-bold hover:bg-yellow-400 hover:text-black transition shadow">Salvar Cliente</button>
            </form>
            
            <h3 class="subtitulo-secao text-md font-bold mt-8 mb-2 text-gray-700">Clientes Cadastrados</h3>
            <ul id="lista-clientes" class="lista-dados divide-y divide-gray-100 max-h-60 overflow-y-auto"></ul>
        </section>

        <section id="aba-produtos" class="aba-conteudo hidden bg-white p-6 rounded-lg shadow">
            <h2 class="titulo-secao text-xl font-bold mb-4 text-gray-700">📦 Cadastrar Novo Produto</h2>
            <form id="formulario-produto" class="espacamento-formulario space-y-4 max-w-md">
                <div>
                    <label class="rotulo-campo block text-sm font-medium text-gray-600">Nome do Produto</label>
                    <input type="text" id="produto-nome" required class="campo-entrada w-full p-2 border rounded focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="rotulo-campo block text-sm font-medium text-gray-600">Preço Unitário (R$)</label>
                    <input type="number" id="produto-preco" step="0.01" required class="campo-entrada w-full p-2 border rounded focus:ring-2 focus:ring-blue-500">
                </div>
                <button type="submit" class="botao-sucesso bg-blue-600 text-white py-2 px-4 rounded font-bold hover:bg-blue-700">Salvar Produto</button>
            </form>

            <h3 class="subtitulo-secao text-md font-bold mt-8 mb-2 text-gray-600">Produtos em Estoque</h3>
            <ul id="lista-produtos" class="lista-dados divide-y divide-gray-200 max-h-60 overflow-y-auto"></ul>
        </section>

        <section id="aba-notas" class="aba-conteudo hidden bg-white p-6 rounded-lg shadow grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="formulario-nota space-y-4">
                <h2 class="titulo-secao text-xl font-bold text-gray-700">📝 Montar Nova Nota</h2>
                <div>
                    <label class="rotulo-campo block text-sm font-medium text-gray-600">Selecione o Cliente</label>
                    <select id="selecao-venda-cliente" class="campo-entrada w-full p-2 border rounded focus:ring-2 focus:ring-green-500"></select>
                </div>
                <div class="grid grid-cols-3 gap-2">
                    <div class="col-span-2">
                        <label class="rotulo-campo block text-sm font-medium text-gray-600">Escolha o Produto</label>
                        <select id="selecao-venda-produto" class="campo-entrada w-full p-2 border rounded focus:ring-2 focus:ring-green-500"></select>
                    </div>
                    <div>
                        <label class="rotulo-campo block text-sm font-medium text-gray-600">Qtd</label>
                        <input type="number" id="venda-quantidade" value="1" min="1" class="campo-entrada w-full p-2 border rounded focus:ring-2 focus:ring-green-500">
                    </div>
                </div>
                <button onclick="adicionarProdutoAoCarrinho()" class="botao-acao w-full bg-green-600 text-white p-2 rounded font-bold hover:bg-green-700">Adicionar à Nota</button>
            </div>

            <div class="resumo-nota border rounded p-4 bg-gray-50 flex flex-col justify-between">
                <div>
                    <h3 class="subtitulo-secao font-bold text-gray-700 mb-2 border-b pb-1">Produtos Adicionados</h3>
                    <table class="tabela-carrinho w-full text-sm text-left">
                        <thead>
                            <tr class="border-b border-gray-300 text-gray-500">
                                <th class="pb-2">Item</th>
                                <th class="pb-2">Qtd</th>
                                <th class="pb-2">Subtotal</th>
                                <th class="pb-2 text-right">Ação</th>
                            </tr>
                        </thead>
                        <tbody id="corpo-tabela-carrinho"></tbody>
                    </table>
                </div>
                <div class="fechamento-nota mt-4">
                    <div class="valor-total text-right font-black text-2xl text-black mb-4">Total: R$ <span id="total-nota">0.00</span></div>
                    
                    <button id="botao-finalizar-nota" onclick="finalizarESalvarNota()" class="w-full bg-yellow-400 text-black p-3 rounded-lg font-black text-lg hover:bg-yellow-500 transition shadow">💾 Finalizar Nota</button>
                    
                    <div id="bloco-acoes-pos-venda" class="hidden space-y-2 mt-2">
                        <button onclick="dispararImpressaoFisica()" class="w-full bg-black text-yellow-400 border border-yellow-400 p-3 rounded-lg font-bold text-md hover:bg-yellow-400 hover:text-black transition shadow flex justify-center items-center gap-2">
                            🖨️ Imprimir Nota
                        </button>
                        <button onclick="enviarNotaWhatsApp()" class="w-full bg-green-600 text-white p-3 rounded-lg font-bold text-md hover:bg-green-700 transition shadow flex justify-center items-center gap-2">
                            💬 Enviar para o WhatsApp
                        </button>
                        <button onclick="resetarPainelParaNovaNota()" class="w-full bg-gray-300 text-gray-700 p-2 rounded text-xs font-semibold hover:bg-gray-400 transition">
                            🔄 Iniciar Nova Nota
                        </button>
                    </div>
                </div>
            </div>
        </section>

        <section id="aba-historico" class="aba-conteudo hidden bg-white p-6 rounded-lg shadow">
            <div class="cabecalho-historico flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                <h2 class="titulo-secao text-xl font-bold text-gray-700">📋 Relatório Histórico de Notas</h2>
                <div class="campo-busca w-full md:w-64">
                    <label class="rotulo-campo block text-xs font-medium text-gray-500 mb-1">Filtrar por Nome do Cliente</label>
                    <input type="text" id="filtro-cliente" oninput="filtrarHistoricoPorCliente()" placeholder="Digite para buscar..." class="campo-entrada w-full p-2 border rounded">
                </div>
            </div>
            <div id="container-historico" class="grade-historico space-y-3 max-h-[450px] overflow-y-auto"></div>
        </section>
    </div>

    <div id="espaco-cupom-impressao" class="modo-termica"></div>

    <script src="aplicativo.js"></script>
</body>
</html>
